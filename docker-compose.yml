services:
  agent:
    build: .
    env_file: .env
    volumes:
      - ./session_cache:/app/session_cache
      - ./logs:/app/logs
    # Override command as needed:
    #   docker compose run agent engage --list a
    #   docker compose run agent dms --list a
    #   docker compose run agent status
    command: ["status"]
    restart: "no"

  # Scheduled engagement (cron-like via Docker)
  engage-cron:
    build: .
    env_file: .env
    volumes:
      - ./session_cache:/app/session_cache
      - ./logs:/app/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[$(date)] Running engagement cycle..."
          openclaw-instagram engage --list a
          echo "[$(date)] Sleeping 4 hours..."
          sleep 14400
        done
    restart: unless-stopped
    profiles:
      - cron

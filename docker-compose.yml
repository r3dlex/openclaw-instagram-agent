services:
  agent:
    build: .
    env_file: .env
    volumes:
      - ./session_cache:/app/session_cache
      - ./logs:/app/logs
    # Override command as needed:
    #   docker compose run agent engage --list a
    #   docker compose run agent dms --list a
    #   docker compose run agent status
    command: ["status"]
    restart: "no"

  # Scheduled engagement (cron-like via Docker)
  engage-cron:
    build: .
    env_file: .env
    volumes:
      - ./session_cache:/app/session_cache
      - ./logs:/app/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[$(date)] Running engagement cycle..."
          openclaw-instagram engage --list a
          echo "[$(date)] Sleeping 4 hours..."
          sleep 14400
        done
    restart: unless-stopped
    profiles:
      - cron

  iamq:
    build: ./iamq
    restart: unless-stopped
    environment:
      IAMQ_HTTP_URL: http://host.docker.internal:18790
      IAMQ_WS_URL: ws://host.docker.internal:18793/ws
      IAMQ_AGENT_ID: instagram_agent
      IAMQ_AGENT_NAME: Instagram Agent
      IAMQ_AGENT_EMOJI: 📸
      IAMQ_AGENT_DESC: Manages Instagram content, posts, and engagement
      IAMQ_AGENT_CAPABILITIES: post_image,schedule_content,analyze_engagement,reply_comments
    extra_hosts:
      - "host.docker.internal:host-gateway"

services:
  agent:
    build: .
    env_file: .env
    volumes:
      - ./session_cache:/app/session_cache
      - ./logs:/app/logs
    # Override command as needed:
    #   docker compose run agent engage --list a
    #   docker compose run agent dms --list a
    #   docker compose run agent status
    command: ["status"]
    restart: "no"

  # Scheduled engagement (cron-like via Docker)
  engage-cron:
    build: .
    env_file: .env
    volumes:
      - ./session_cache:/app/session_cache
      - ./logs:/app/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[$(date)] Running engagement cycle..."
          openclaw-instagram engage --list a
          echo "[$(date)] Sleeping 4 hours..."
          sleep 14400
        done
    restart: unless-stopped
    profiles:
      - cron

  # IAMQ sidecar — inter-agent messaging (Elixir/OTP, zero-install)
  iamq:
    image: openclaw-iamq-sidecar:latest
    restart: unless-stopped
    environment:
      IAMQ_HTTP_URL: http://host.docker.internal:18790
      IAMQ_WS_URL: ws://host.docker.internal:18793/ws
      IAMQ_AGENT_ID: instagram_agent
      IAMQ_AGENT_NAME: InstaOps
      IAMQ_AGENT_EMOJI: "\U0001F4F8"
      IAMQ_AGENT_DESC: "Instagram engagement automation. Likes posts/reels, monitors DMs, reports through messaging channels."
      IAMQ_AGENT_CAPABILITIES: instagram_engagement,post_liking,reel_liking,dm_monitoring,account_monitoring,engagement_reporting,api_fallback,browser_automation,rate_limiting
    extra_hosts:
      - "host.docker.internal:host-gateway"
